<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'DM Sans';
  src: url('../fonts/DMSans-VariableFont_opsz_wght.ttf') format('truetype');
  font-weight: 100 900; font-style: normal; font-display: swap;
}
@font-face {
  font-family: 'DM Sans';
  src: url('../fonts/DMSans-Italic-VariableFont_opsz_wght.ttf') format('truetype');
  font-weight: 100 900; font-style: italic; font-display: swap;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fffdf0; padding: 20px; }
.row { margin-bottom: 14px; border-bottom: 1.5px solid rgba(24,24,60,0.08); padding-bottom: 14px; }
.row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.meta { font-family: 'DM Sans', sans-serif; font-size: 11px; color: #9090b0; margin-bottom: 3px; }
</style>
</head><body>

<div class="row">
  <div class="meta">Outfit 800 · 48px · −0.02em · Display / Hero</div>
  <div style="font-family:'Outfit',sans-serif; font-size:48px; font-weight:800; color:#1c1c2e; letter-spacing:-0.02em; line-height:1.1">Meals delivered,<br>neighbors fed.</div>
</div>
<div class="row">
  <div class="meta">Outfit 700 · 38px · −0.02em · H1</div>
  <div style="font-family:'Outfit',sans-serif; font-size:38px; font-weight:700; color:#1c1c2e; letter-spacing:-0.02em; line-height:1.15">Today's delivery routes</div>
</div>
<div class="row">
  <div class="meta">Outfit 600 · 30px · H2</div>
  <div style="font-family:'Outfit',sans-serif; font-size:30px; font-weight:600; color:#1c1c2e; line-height:1.2">North Side Route — 12 stops</div>
</div>
<div class="row">
  <div class="meta">Outfit 600 · 24px · H3</div>
  <div style="font-family:'Outfit',sans-serif; font-size:24px; font-weight:600; color:#1c1c2e; line-height:1.3">Add a new recipient</div>
</div>
<div class="row">
  <div class="meta">Outfit 700 · 48px · KPI / Dashboard number</div>
  <div style="display:flex; gap:28px; align-items:baseline">
    <div style="font-family:'Outfit',sans-serif; font-size:48px; font-weight:700; color:#1c1c2e; line-height:1">24</div>
    <div style="font-family:'Outfit',sans-serif; font-size:48px; font-weight:700; color:#4ead6f; line-height:1">18</div>
    <div style="font-family:'Outfit',sans-serif; font-size:48px; font-weight:700; color:#7890fa; line-height:1">6</div>
  </div>
</div>

</body></html>
