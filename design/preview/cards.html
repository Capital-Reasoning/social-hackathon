<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #fffdf0; padding: 20px; font-family: 'DM Sans', sans-serif; }
.row { display: flex; gap: 12px; margin-bottom: 14px; }
.card {
  background: #fff; border-radius: 12px;
  border: 1.5px solid rgba(24,24,60,0.13); padding: 18px 20px;
}
.card-title { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600; color: #1c1c2e; margin-bottom: 4px; }
.card-sub { font-size: 13px; color: #4e4e72; }
.badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
.dot { width: 7px; height: 7px; border-radius: 50%; }
.meta { font-size: 12px; color: #9090b0; margin-top: 8px; }
.kpi { font-family: 'Outfit', sans-serif; font-size: 36px; font-weight: 700; color: #1c1c2e; line-height: 1; margin-bottom: 4px; }
.divider { height: 1.5px; background: rgba(24,24,60,0.07); margin: 10px 0; }
</style></head><body>

<div class="row">
  <!-- Route card -->
  <div class="card" style="flex:1.4">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px">
      <div>
        <div class="card-title">North Side Route</div>
        <div class="card-sub">12 stops · Est. 2h 15min</div>
      </div>
      <span class="badge" style="background:#edfaf3; color:#2e8a50; border:1.5px solid #c8f0d8">
        <span class="dot" style="background:#4ead6f"></span>On track
      </span>
    </div>
    <div class="divider"></div>
    <div style="display:flex; gap:18px">
      <div><div class="kpi" style="color:#7890fa">8</div><div class="meta">Delivered</div></div>
      <div><div class="kpi" style="color:#f0a830">4</div><div class="meta">Remaining</div></div>
      <div><div class="kpi" style="color:#4e4e72">0</div><div class="meta">Missed</div></div>
    </div>
  </div>

  <!-- Recipient card -->
  <div class="card" style="flex:1">
    <div style="display:flex; gap:12px; align-items:flex-start">
      <div style="width:44px; height:44px; border-radius:999px; background:#fae278; border:1.5px solid rgba(200,160,0,0.3); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0">👤</div>
      <div>
        <div class="card-title">Margaret Okafor</div>
        <div class="card-sub">231 Oak Ave, Apt 3 · Stop #7</div>
        <div style="margin-top:8px">
          <span class="badge" style="background:#fff8eb; color:#c47d00; border:1.5px solid #fde8b0; font-size:11px">⚠ Nut allergy</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="row">
  <!-- Stats card -->
  <div class="card" style="flex:1; text-align:center; padding:16px">
    <div class="kpi">142</div>
    <div class="card-sub" style="font-size:13px">Meals this week</div>
  </div>
  <div class="card" style="flex:1; text-align:center; padding:16px">
    <div class="kpi" style="color:#4ead6f">97%</div>
    <div class="card-sub" style="font-size:13px">Delivery rate</div>
  </div>
  <div class="card" style="flex:1; text-align:center; padding:16px">
    <div class="kpi" style="color:#7890fa">23</div>
    <div class="card-sub" style="font-size:13px">Active volunteers</div>
  </div>

  <!-- Alert card -->
  <div class="card" style="flex:1.3; background:#fff8eb; border-color:#fde8b0;">
    <div style="font-size:13px; font-weight:600; color:#c47d00; margin-bottom:4px">⚠ Attention needed</div>
    <div style="font-size:13px; color:#4e4e72">East Route has no driver assigned for today.</div>
    <div style="margin-top:10px">
      <button style="height:32px; padding:0 14px; border-radius:6px; background:#7890fa; color:#fff; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; border:none; cursor:pointer">Assign now</button>
    </div>
  </div>
</div>

</body></html>
